  - id: leva
    nome: "ETF a leva"
    nota: "ATTENZIONE: leva con reset giornaliero — il moltiplicatore (2x, 3x) vale solo sul rendimento di UN giorno. Su periodi lunghi il compounding causa 'volatility decay': in mercati laterali la performance può essere molto peggiore di 2x/3x l'indice, anche negativa con indice piatto. Strumenti da trading tattico, non da buy-and-hold né da PAC. I 3x esistono solo come ETN/ETP (i limiti UCITS vietano leva 3x): rischio emittente in più. Verificati su justETF (luglio 2026)."
