  - id: obbligazionari
    nome: "ETF obbligazionari"
    nota: "Gli ETF obbligazionari non garantiscono il capitale: rispecchiano il valore dei bond sul mercato secondario; quando scendono aumenta il rendimento atteso. Il periodo di detenzione appropriato ≈ la durata: un rialzo dei tassi è negativo per chi detiene meno della durata, positivo per chi detiene più a lungo. Approfondimenti: https://www.bogleheads.org/forum/viewtopic.php?t=360575 e https://ofdollarsanddata.com/why-you-dont-lose-money-in-bonds-if-you-wait-long-enough/ — ISIN e TER verificati su justETF (luglio 2026)."
