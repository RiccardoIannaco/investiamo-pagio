nome: "Golden Butterfly The Bull"
slug: golden-butterfly-the-bull
descrizione: >-
  The Bull in un video propone un portafoglio per principianti ispirandosi al
  Golden Butterfly, ma adattandolo a investitori europei inesperti. Ha un buon
  rendimento atteso e, se ribilanciato correttamente, una minore volatilità.
  Soffre by design della single line fallacy (in qualunque periodo uno degli
  strumenti sottoperformerà) e nei bull market tende a restare indietro
  (rischio FOMO).
ribilanciamento: annuale
